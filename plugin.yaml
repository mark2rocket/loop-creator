name: loop-creator
version: "1.5.0"
description: Loop Creator plugin — route standard/full/gs loop runs, ask goal/control intake questions, preview HSD diagrams before slash-command scaffolds, scaffold ACO/control-policy/evidence files, eval packs, failure taxonomy, runner-neutral specs, model-harness-grader identity, fit scoring, quick kickoff cards, restartable predicate/story state, validate observed trace-grounded evidence and approval ledgers, summarize ACO blockers, and check for upstream updates.
provides_tools:
  - loop_creator_scaffold
  - loop_creator_validate_run
  - loop_creator_summarize_run
  - loop_creator_check_update
provides_hooks:
  - pre_gateway_dispatch
