schema: loop-creator-runner-spec-v1
task: Improve and verify an AI-native consulting proposal against the goal contract.
environment: local-run-folder
agent_backend: hermes
agent_command: optional; this spec does not prove a runner is installed or executed
track: standard
trigger_mode: manual
max_iterations: 5
between_iterations: review eval/eval_spec.yaml and update state/evidence-ledger.json
exit_when: acceptance criteria pass with direct evidence and no fake-evidence flags
evidence_required:
  - state/evidence-ledger.json claims[].evidence_path
  - state/evidence-ledger.json claims[].trace_ref
permission_policy:
  automation_level: supervised
  dangerous_side_effects_require_human: true
handoff_required: state/session-handoff.md
install_boundary: Runner spec is portable planning metadata, not proof of execution.
